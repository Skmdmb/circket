<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunday League Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ball-dot { @apply w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black border border-slate-700 flex-shrink-0; }
        .striker-glow { @apply ring-2 ring-yellow-500 bg-slate-800 border-yellow-500/50; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-100 min-h-screen pb-24 font-sans">

    <nav class="p-4 flex justify-between items-center bg-slate-900/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <h1 class="font-black italic text-yellow-500 tracking-tighter text-xl uppercase">Sunday Live</h1>
        <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] bg-slate-800 px-4 py-2 rounded-full font-bold uppercase tracking-widest border border-slate-700">Admin</button>
    </nav>

    <div class="max-w-md mx-auto p-4">
        
        <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-2xl mb-4 relative overflow-hidden">
            <div class="flex justify-between items-start mb-4 relative z-10">
                <div>
                    <h2 id="batTeamDisp" class="text-sm font-black text-yellow-400 uppercase tracking-widest">---</h2>
                    <p class="text-[9px] text-slate-500 font-black uppercase tracking-tighter">Innings <span id="innTag">1</span></p>
                </div>
                <div id="targetBox" class="hidden text-right">
                    <p class="text-[9px] font-black text-blue-400 uppercase">Target</p>
                    <p id="targetVal" class="text-2xl font-black text-blue-500 tracking-tighter">---</p>
                </div>
            </div>
            
            <div class="flex items-baseline gap-2 relative z-10">
                <h2 class="text-6xl font-black tracking-tighter" id="dispScore">0/0</h2>
                <p class="text-slate-400 font-bold text-lg">(<span id="dispOvers">0.0</span>/<span id="limitOvers">5</span>)</p>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-800/50 flex gap-2 overflow-x-auto no-scrollbar" id="overTimeline"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div id="cardS" class="bg-slate-900 p-4 rounded-2xl border border-slate-800 transition-all duration-300">
                <p class="text-[8px] text-blue-400 font-black mb-1 uppercase">Striker</p>
                <p id="dispSName" class="font-bold truncate text-sm text-slate-300">---</p>
                <p id="dispSStats" class="text-2xl font-black">0(0)</p>
            </div>
            <div id="cardNS" class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <p class="text-[8px] text-slate-500 font-black mb-1 uppercase">Non-Striker</p>
                <p id="dispNSName" class="font-bold truncate text-sm text-slate-300">---</p>
                <p id="dispNSStats" class="text-2xl font-black">0(0)</p>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 mb-6 flex justify-between items-center">
            <div>
                <p class="text-[8px] text-red-500 font-black mb-1 uppercase">Current Bowler</p>
                <p id="dispBName" class="font-bold text-sm">---</p>
            </div>
            <div class="text-right">
                <p id="dispBStats" class="text-xl font-black">0-0 (0.0)</p>
                <p id="dispBEcon" class="text-[9px] font-bold text-slate-500 uppercase">Econ: 0.00</p>
            </div>
        </div>

        <div id="scorerPanel" class="hidden bg-slate-900 p-5 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-4 mb-8">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="handleRun(0)" class="bg-slate-950 h-14 rounded-2xl font-bold border border-slate-800 active:scale-95 transition">0</button>
                <button onclick="handleRun(1)" class="bg-slate-950 h-14 rounded-2xl font-bold border border-slate-800 active:scale-95 transition">1</button>
                <button onclick="handleRun(2)" class="bg-slate-950 h-14 rounded-2xl font-bold border border-slate-800 active:scale-95 transition">2</button>
                <button onclick="handleRun(3)" class="bg-slate-950 h-14 rounded-2xl font-bold border border-slate-800 active:scale-95 transition">3</button>
                <button onclick="handleRun(4)" class="bg-blue-600 h-14 rounded-2xl font-black shadow-lg shadow-blue-900/40">4</button>
                <button onclick="handleRun(6)" class="bg-green-600 h-14 rounded-2xl font-black shadow-lg shadow-green-900/40">6</button>
                <button onclick="openExtraMenu()" class="bg-yellow-600 h-14 rounded-2xl font-black text-[10px]">EXTRA</button>
                <button onclick="handleWicketFlow()" class="bg-red-600 h-14 rounded-2xl font-black text-[10px]">OUT</button>
            </div>

            <div id="extraMenu" class="hidden grid grid-cols-2 gap-2 p-2 bg-black/40 rounded-2xl">
                <button onclick="handleExtra('WD')" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">Wide + Runs</button>
                <button onclick="handleExtra('NB')" class="bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase">No Ball + Runs</button>
            </div>

            <div class="flex gap-2">
                <button onclick="undo()" class="flex-1 bg-slate-800 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Undo</button>
                <button onclick="fullSystemReset()" class="bg-red-900/10 px-4 py-3 rounded-xl text-[10px] font-black text-red-500 uppercase">Reset</button>
            </div>

            <div class="pt-4 border-t border-slate-800">
                <div class="flex justify-between items-center mb-3">
                    <div id="selectionHeader" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Squad Selection</div>
                    <button onclick="clearForInjury()" class="text-[8px] bg-slate-800 px-2 py-1 rounded font-bold text-slate-400">INJURY CHANGE</button>
                </div>
                <div id="adminPList" class="space-y-1 max-h-48 overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <div id="statsContent" class="space-y-4"></div>
    </div>

    <script>
        const BIN_ID = "3bf04df403317e6901ba"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let state = {
            maxOvers: 5, runs: 0, wickers: 0, balls: 0,
            players: [], sIdx: null, nsIdx: null, bIdx: null, lastBIdx: null,
            batTeam: 'Team A', bowlTeam: 'Team B', curBat: 'Team A', curInn: 1,
            target: null, overHistory: [], fow: []
        };
        let isAdmin = false;

        function handleRun(r) {
            if(!checkSelection()) return;
            state.runs += r; state.balls++;
            state.players[state.sIdx].r += r; state.players[state.sIdx].b++;
            state.players[state.bIdx].rc += r; state.players[state.bIdx].bb++;
            state.overHistory.push(r.toString());
            finalizeBall(r);
        }

        function handleExtra(type) {
            let runs = parseInt(prompt(`${type} + how many runs?`, "0")) || 0;
            let total = 1 + runs;
            state.runs += total;
            state.players[state.bIdx].rc += total;
            if(type === 'NB') {
                state.players[state.sIdx].r += runs;
                state.players[state.sIdx].b++;
                state.overHistory.push(`NB${runs > 0 ? '+'+runs : ''}`);
            } else {
                state.overHistory.push(`WD${runs > 0 ? '+'+runs : ''}`);
            }
            if(runs % 2 !== 0) swap();
            document.getElementById('extraMenu').classList.add('hidden');
            render(); sync();
        }

        function handleWicketFlow() {
            if(!checkSelection()) return;
            let type = confirm("OK = Normal Wicket\nCANCEL = Run Out");
            if(type) {
                state.wickers++; state.balls++;
                state.players[state.bIdx].w++; state.players[state.bIdx].bb++;
                state.players[state.sIdx].isOut = true;
                state.players[state.sIdx].outDesc = `c Field b ${state.players[state.bIdx].name}`;
                state.fow.push(`${state.runs}/${state.wickers} (${state.players[state.sIdx].name}, ${Math.floor(state.balls/6)}.${state.balls%6} ov)`);
                state.sIdx = null; state.overHistory.push('W');
            } else {
                let runs = parseInt(prompt("Runs completed?", "0")) || 0;
                state.runs += runs; state.balls++;
                state.players[state.sIdx].r += runs; state.players[state.sIdx].b++;
                state.players[state.bIdx].rc += runs; state.players[state.bIdx].bb++;
                let who = confirm("Striker Out?");
                let outIdx = who ? state.sIdx : state.nsIdx;
                state.players[outIdx].isOut = true;
                state.players[outIdx].outDesc = 'run out';
                state.wickers++;
                state.fow.push(`${state.runs}/${state.wickers} (${state.players[outIdx].name}, ${Math.floor(state.balls/6)}.${state.balls%6} ov)`);
                if(who) state.sIdx = null; else state.nsIdx = null;
                state.overHistory.push(`W(${runs})`);
            }
            finalizeBall(0);
        }

        function finalizeBall(r) {
            if(r % 2 !== 0) swap();
            if(state.balls > 0 && state.balls % 6 === 0) {
                state.lastBIdx = state.bIdx; // Lock the bowler
                state.bIdx = null; 
                state.overHistory = [];
                swap();
                alert("Over Finished! Select a NEW bowler.");
            }
            render(); sync();
        }

        function checkSelection() {
            if(state.sIdx === null || state.nsIdx === null || state.bIdx === null) {
                alert("Please select Striker, Non-Striker, and Bowler first.");
                return false;
            }
            return true;
        }

        function renderAdminList() {
            const list = document.getElementById('adminPList');
            list.innerHTML = '';
            state.players.forEach((p, i) => {
                if(p.isOut) return;
                const isBat = p.team === state.curBat;
                const isLockedBowler = (i === state.lastBIdx);
                
                // Hide selection buttons if player is already in a slot
                const inSlot = (i === state.sIdx || i === state.nsIdx || i === state.bIdx);
                if(inSlot) return;

                list.innerHTML += `<div class="flex justify-between items-center bg-slate-950 p-2 rounded-xl mb-1 border border-slate-800">
                    <span class="text-[10px] font-bold uppercase ml-2 text-slate-400">${p.name}</span>
                    <div class="flex gap-1">
                        ${isBat && state.sIdx === null ? `<button onclick="setField(${i},'S')" class="bg-blue-900 px-3 py-1 rounded text-[8px] font-black">STRIKE</button>` : ''}
                        ${isBat && state.nsIdx === null ? `<button onclick="setField(${i},'NS')" class="bg-slate-700 px-3 py-1 rounded text-[8px] font-black">NON</button>` : ''}
                        ${!isBat && state.bIdx === null && !isLockedBowler ? `<button onclick="setField(${i},'B')" class="bg-red-900 px-3 py-1 rounded text-[8px] font-black">BOWL</button>` : ''}
                        ${isLockedBowler ? `<span class="text-[7px] text-slate-600 uppercase font-black px-2">Wait 1 Over</span>` : ''}
                    </div>
                </div>`;
            });
        }

        function renderStats() {
            const cont = document.getElementById('statsContent');
            cont.innerHTML = [state.batTeam, state.bowlTeam].map(t => {
                const bats = state.players.filter(p => p.team === t);
                const bowls = state.players.filter(p => p.team !== t && p.bb > 0);
                return `
                <div class="bg-slate-900 rounded-[2rem] p-5 border border-slate-800 shadow-xl">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-4 tracking-widest">${t} Scorecard</p>
                    <table class="w-full text-[11px] mb-6">
                        <tr class="text-slate-500 border-b border-slate-800 font-bold uppercase"><th class="pb-2">Batting</th><th class="pb-2 text-center">R</th><th class="pb-2 text-center">B</th><th class="pb-2 text-right">SR</th></tr>
                        ${bats.map(p => `<tr class="border-b border-slate-800/30">
                            <td class="py-3"><p class="font-bold ${p.isOut ? 'text-slate-500' : 'text-white'}">${p.name}</p><p class="text-[8px] text-slate-600">${p.isOut ? p.outDesc : 'not out'}</p></td>
                            <td class="text-center font-black">${p.r}</td><td class="text-center text-slate-400">${p.b}</td>
                            <td class="text-right text-slate-400 font-mono">${p.b > 0 ? ((p.r/p.b)*100).toFixed(1) : '0.0'}</td>
                        </tr>`).join('')}
                    </table>
                    <table class="w-full text-[11px]">
                        <tr class="text-slate-500 border-b border-slate-800 font-bold uppercase"><th class="pb-2">Bowling</th><th class="pb-2 text-center">O</th><th class="pb-2 text-center">W</th><th class="pb-2 text-right">Econ</th></tr>
                        ${bowls.map(p => `<tr>
                            <td class="py-2 font-bold">${p.name}</td>
                            <td class="text-center">${Math.floor(p.bb/6)}.${p.bb%6}</td>
                            <td class="text-center font-black text-red-500">${p.w}</td>
                            <td class="text-right text-slate-400 font-mono">${p.bb > 0 ? (p.rc/(p.bb/6)).toFixed(2) : '0.00'}</td>
                        </tr>`).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        function setField(i, type) { 
            if(type==='S') state.sIdx = i; 
            if(type==='NS') state.nsIdx = i; 
            if(type==='B') state.bIdx = i; 
            render(); sync(); 
        }

        function clearForInjury() {
            if(confirm("Change a live player due to injury?")) {
                state.sIdx = null; state.nsIdx = null; render();
            }
        }

        function toggleAdmin() { isAdmin=true; document.getElementById('scorerPanel').classList.toggle('hidden'); renderAdminList(); }
        function openExtraMenu() { document.getElementById('extraMenu').classList.toggle('hidden'); }
        function swap() { let t = state.sIdx; state.sIdx = state.nsIdx; state.nsIdx = t; }
        async function sync() { if(isAdmin) await fetch(API_URL, {method:'POST', body:JSON.stringify(state), headers:{'Content-Type':'application/json'}}); }
        
        function render() {
            document.getElementById('dispScore').innerText = `${state.runs}/${state.wickers}`;
            document.getElementById('dispOvers').innerText = `${Math.floor(state.balls/6)}.${state.balls%6}`;
            document.getElementById('cardS').classList.toggle('striker-glow', state.sIdx !== null);
            
            if(state.sIdx !== null) {
                document.getElementById('dispSName').innerText = state.players[state.sIdx].name;
                document.getElementById('dispSStats').innerText = `${state.players[state.sIdx].r}(${state.players[state.sIdx].b})`;
            } else { document.getElementById('dispSName').innerText = "Select Striker"; }

            if(state.nsIdx !== null) {
                document.getElementById('dispNSName').innerText = state.players[state.nsIdx].name;
                document.getElementById('dispNSStats').innerText = `${state.players[state.nsIdx].r}(${state.players[state.nsIdx].b})`;
            } else { document.getElementById('dispNSName').innerText = "Select Non-Striker"; }

            if(state.bIdx !== null) {
                const b = state.players[state.bIdx];
                document.getElementById('dispBName').innerText = b.name;
                document.getElementById('dispBStats').innerText = `${b.w}-${b.rc} (${Math.floor(b.bb/6)}.${b.bb%6})`;
                document.getElementById('dispBEcon').innerText = `Econ: ${b.bb > 0 ? (b.rc/(b.bb/6)).toFixed(2) : '0.00'}`;
            } else { document.getElementById('dispBName').innerText = "Select Bowler"; }

            document.getElementById('overTimeline').innerHTML = state.overHistory.map(b => `<div class="ball-dot ${b.includes('W') ? 'bg-red-600' : 'bg-slate-800'}">${b}</div>`).join('');
            renderAdminList(); renderStats();
        }
    </script>
</body>
</html>
