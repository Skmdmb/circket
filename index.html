<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunday League Live</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#0f172a; color:white; }
.no-scrollbar::-webkit-scrollbar { display:none; }
</style>
</head><body class="p-4"><h1 class="text-center text-xl font-black text-yellow-400 mb-4">🏏 LIVE SCORE</h1><div class="text-center mb-4">
<h2 id="score" class="text-4xl font-black">0/0</h2>
<p>Overs: <span id="overs">0.0</span></p>
<p id="target"></p>
</div><div id="overDisplay" class="flex gap-2 flex-wrap justify-center mb-3"></div>
<div id="fow" class="text-xs text-slate-400 text-center mb-4"></div><div class="grid grid-cols-4 gap-2 mb-4">
<button onclick="run(0)">0</button>
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(3)">3</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="undo()">Undo</button><button onclick="noBall(0)">NB+0</button>
<button onclick="noBall(1)">NB+1</button>
<button onclick="noBall(2)">NB+2</button>
<button onclick="noBall(3)">NB+3</button>
<button onclick="noBall(4)">NB+4</button>
<button onclick="noBall(6)">NB+6</button>

<button onclick="wide()">WD</button>

<button onclick="runOut(1)">RO+1</button>
<button onclick="runOut(2)">RO+2</button>
<button onclick="runOut(3)">RO+3</button>

</div><input id="playerName" placeholder="Player Name" class="w-full p-2 mb-2 text-black">
<button onclick="addPlayer()" class="bg-yellow-400 w-full p-2 text-black font-bold">Add Player</button><div id="players" class="mt-4"></div>
<div id="stats" class="mt-6"></div><script>

let state = {
runs:0,wickets:0,balls:0,maxOvers:5,
players:[],s:null,ns:null,b:null,
target:null,innings:1,
over:[],fow:[]
};

let history=[];

function save(){ history.push(JSON.stringify(state)); }
function undo(){ if(history.length) state=JSON.parse(history.pop()); render(); }

function addPlayer(){
let n=document.getElementById('playerName').value;
if(!n) return;
state.players.push({name:n,r:0,b:0,w:0,rc:0,bb:0,out:false});
document.getElementById('playerName').value='';
render();
}

function run(r){
if(state.s==null||state.b==null) return alert("Select players");
save();

state.runs+=r;
state.balls++;

state.players[state.s].r+=r;
state.players[state.s].b++;

state.players[state.b].rc+=r;
state.players[state.b].bb++;

state.over.push(r);

if(r%2) swap();

overCheck();
render();
}

function wicket(){
if(state.s==null) return;
save();

state.fow.push(`${state.runs}/${state.wickets+1} (${state.players[state.s].name}, ${overs()})`);

state.wickets++;
state.balls++;

state.players[state.s].out=true;
state.players[state.b].w++;
state.players[state.b].bb++;

state.over.push("W");

state.s=null;

overCheck();
render();
}

function runOut(r){
if(state.s==null||state.ns==null) return;
save();

state.runs+=r;
state.balls++;

state.players[state.s].r+=r;
state.players[state.s].b++;

state.wickets++;

state.fow.push(`${state.runs}/${state.wickets} (${state.players[state.s].name}, ${overs()})`);

state.players[state.s].out=true;

state.over.push(r+"W");

if(r%2==0) state.s=state.ns;
else state.s=state.ns;

state.ns=null;

overCheck();
render();
}

function noBall(r){
save();

state.runs+=(1+r);
state.players[state.s].r+=r;
state.players[state.b].rc+=(1+r);

state.over.push("NB+"+r);

render();
}

function wide(){
save();
state.runs+=1;
state.players[state.b].rc+=1;
state.over.push("WD");
render();
}

function swap(){ let t=state.s; state.s=state.ns; state.ns=t; }

function overCheck(){
if(state.balls%6==0){
swap();
state.over=[];
}
}

function overs(){
return Math.floor(state.balls/6)+"."+(state.balls%6);
}

function render(){

document.getElementById('score').innerText=`${state.runs}/${state.wickets}`;
document.getElementById('overs').innerText=overs();

document.getElementById('overDisplay').innerHTML=
state.over.map(x=>`<span class="bg-slate-700 px-2">${x}</span>`).join('');

document.getElementById('fow').innerText=state.fow.join(" • ");

let list="";
state.players.forEach((p,i)=>{
list+=`
<div class="flex justify-between text-sm mb-1">
${p.name}
<div>
<button onclick="state.s=${i}">S</button>
<button onclick="state.ns=${i}">NS</button>
<button onclick="state.b=${i}">B</button>
</div>
</div>`;
});
document.getElementById('players').innerHTML=list;

let bat=`<h2 class="text-yellow-400">Batting</h2>
<table class="w-full text-xs">
<tr><th>Name</th><th>R</th><th>B</th><th>SR</th></tr>
${state.players.map(p=>`
<tr class="${p.out?'text-slate-500':''}">
<td>${p.name}${p.out?'':'*'}</td>
<td>${p.r}</td>
<td>${p.b}</td>
<td>${p.b?((p.r/p.b)*100).toFixed(1):0}</td>
</tr>`).join('')}
</table>`;

let bowl=`<h2 class="text-blue-400 mt-4">Bowling</h2>
<table class="w-full text-xs">
<tr><th>Name</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr>
${state.players.filter(p=>p.bb>0).map(p=>`
<tr>
<td>${p.name}</td>
<td>${Math.floor(p.bb/6)}.${p.bb%6}</td>
<td>${p.rc}</td>
<td>${p.w}</td>
<td>${p.bb?(p.rc/(p.bb/6)).toFixed(2):0}</td>
</tr>`).join('')}
</table>`;

document.getElementById('stats').innerHTML=bat+bowl;

}

render();

</script></body>
</html>
