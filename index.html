<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunday Live Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ball-dot { @apply w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black border border-slate-700 flex-shrink-0; }
        .admin-input { @apply bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm focus:border-yellow-500 outline-none w-full; }
        .btn-add { @apply bg-yellow-600 hover:bg-yellow-500 text-black font-black px-4 rounded-xl transition-all; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-100 min-h-screen pb-24 font-sans">

    <nav class="p-4 flex justify-between items-center bg-slate-900/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <h1 class="font-black italic text-yellow-500 tracking-tighter text-xl uppercase">Sunday Live</h1>
        <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] bg-slate-800 px-4 py-2 rounded-full font-bold uppercase tracking-widest border border-slate-700">Admin Login</button>
    </nav>

    <div class="max-w-md mx-auto p-4">
        
        <div id="liveDashboard">
            <div class="bg-slate-900 rounded-[2rem] p-6 border border-slate-800 shadow-2xl mb-4 text-center">
                <h2 id="batTeamDisp" class="text-sm font-black text-yellow-400 uppercase tracking-widest mb-2">Team A</h2>
                <div class="flex items-baseline justify-center gap-2">
                    <h2 class="text-6xl font-black tracking-tighter" id="dispScore">0/0</h2>
                    <p class="text-slate-400 font-bold text-lg">(<span id="dispOvers">0.0</span>/<span id="limitOvers">5</span>)</p>
                </div>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-6 animate-in fade-in duration-300">
            
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4">
                <p class="text-[10px] font-black text-yellow-500 uppercase tracking-widest">1. Set Match Basics</p>
                <div class="grid grid-cols-2 gap-2">
                    <input id="teamAInput" type="text" placeholder="Team A Name" class="admin-input">
                    <input id="teamBInput" type="text" placeholder="Team B Name" class="admin-input">
                </div>
                <input id="oversInput" type="number" placeholder="Total Overs (e.g. 5)" class="admin-input">
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4">
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">2. Add Players to Squad</p>
                
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input id="pNameA" type="text" placeholder="Team A Player Name" class="admin-input">
                        <button onclick="addPlayer('A')" class="btn-add">ADD</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="pNameB" type="text" placeholder="Team B Player Name" class="admin-input">
                        <button onclick="addPlayer('B')" class="btn-add">ADD</button>
                    </div>
                </div>

                <div class="pt-2 border-t border-slate-800">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-2">Current Squads:</p>
                    <div id="squadList" class="text-[10px] text-slate-400 grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-slate-800 space-y-4">
                <p class="text-[10px] font-black text-green-500 uppercase tracking-widest text-center">3. Scoring Controls</p>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="handleRun(0)" class="bg-slate-950 h-12 rounded-xl border border-slate-800 font-bold">0</button>
                    <button onclick="handleRun(1)" class="bg-slate-950 h-12 rounded-xl border border-slate-800 font-bold">1</button>
                    <button onclick="handleRun(2)" class="bg-slate-950 h-12 rounded-xl border border-slate-800 font-bold">2</button>
                    <button onclick="handleRun(3)" class="bg-slate-950 h-12 rounded-xl border border-slate-800 font-bold">3</button>
                    <button onclick="handleRun(4)" class="bg-blue-600 h-12 rounded-xl font-black">4</button>
                    <button onclick="handleRun(6)" class="bg-green-600 h-12 rounded-xl font-black">6</button>
                    <button onclick="handleWicketFlow()" class="bg-red-600 h-12 rounded-xl font-black text-[10px]">OUT</button>
                    <button onclick="clearForInjury()" class="bg-orange-600 h-12 rounded-xl font-black text-[9px]">INJURY</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800">
                    <div>
                        <p class="text-[8px] font-black text-blue-400 uppercase mb-2">Select Batsman</p>
                        <div id="adminBatList" class="space-y-1"></div>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-red-400 uppercase mb-2">Select Bowler</p>
                        <div id="adminBowlList" class="space-y-1"></div>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button onclick="resetAllData()" class="w-full bg-red-900/30 border border-red-500/50 text-red-500 py-3 rounded-xl font-black text-xs uppercase tracking-widest">
                    ⚠️ Reset Entire Match
                </button>
            </div>
        </div>

        <div id="statsContent" class="mt-8 space-y-4"></div>
    </div>

    <script>
        const BIN_ID = "3bf04df403317e6901ba"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;
        const ADMIN_PASS = "college123";

        let state = {
            maxOvers: 5, runs: 0, wickers: 0, balls: 0,
            players: [], sIdx: null, nsIdx: null, bIdx: null,
            batTeam: 'Team A', curBat: 'Team A', overHistory: []
        };
        let isAdmin = false;

        function toggleAdmin() {
            if(!isAdmin) {
                if(prompt("Admin PIN:") === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('adminBtn').innerText = "Exit Admin";
                }
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('adminBtn').innerText = "Admin Login";
            }
            render();
        }

        function addPlayer(type) {
            const inputId = type === 'A' ? 'pNameA' : 'pNameB';
            const teamName = type === 'A' ? (document.getElementById('teamAInput').value || 'Team A') : (document.getElementById('teamBInput').value || 'Team B');
            const name = document.getElementById(inputId).value;
            if(!name) return;
            
            state.players.push({name: name, team: teamName, r:0, b:0, isOut:false, rc:0, bb:0, w:0});
            document.getElementById(inputId).value = '';
            render(); sync();
        }

        function resetAllData() {
            if(confirm("Are you sure? This deletes ALL scores and players.")) {
                state = { maxOvers: 5, runs: 0, wickers: 0, balls: 0, players: [], sIdx: null, nsIdx: null, bIdx: null, batTeam: 'Team A', curBat: 'Team A', overHistory: [] };
                render(); sync();
            }
        }

        // Logic functions (handleRun, handleWicket, render, sync) same as previous for stability
        function handleRun(r) {
            if(state.sIdx === null || state.bIdx === null) return alert("Select Strike/Bowler!");
            state.runs += r; state.balls++;
            state.players[state.sIdx].r += r; state.players[state.sIdx].b++;
            state.players[state.bIdx].rc += r; state.players[state.bIdx].bb++;
            if(r % 2 !== 0) swap();
            if(state.balls % 6 === 0) { state.bIdx = null; alert("Over Over!"); }
            render(); sync();
        }

        function setField(i, type) { 
            if(type==='S') state.sIdx = i; else if(type==='NS') state.nsIdx = i; else state.bIdx = i; 
            render(); sync(); 
        }

        function swap() { let t = state.sIdx; state.sIdx = state.nsIdx; state.nsIdx = t; }
        function clearForInjury() { state.sIdx = null; state.nsIdx = null; render(); }
        async function sync() { if(isAdmin) await fetch(API_URL, {method:'POST', body:JSON.stringify(state), headers:{'Content-Type':'application/json'}}); }

        function render() {
            document.getElementById('batTeamDisp').innerText = state.curBat;
            document.getElementById('dispScore').innerText = `${state.runs}/${state.wickers}`;
            document.getElementById('dispOvers').innerText = `${Math.floor(state.balls/6)}.${state.balls%6}`;

            const squadBox = document.getElementById('squadList');
            const batL = document.getElementById('adminBatList');
            const bowlL = document.getElementById('adminBowlList');
            
            squadBox.innerHTML = ''; batL.innerHTML = ''; bowlL.innerHTML = '';

            state.players.forEach((p, i) => {
                squadBox.innerHTML += `<div>${p.name} (${p.team})</div>`;
                if(p.isOut) return;
                
                const btn = (type, color) => `<button onclick="setField(${i},'${type}')" class="bg-${color}-900 px-2 py-1 rounded text-[7px] font-black">${type}</button>`;
                
                if(p.team === state.curBat) {
                    batL.innerHTML += `<div class="flex justify-between items-center bg-slate-950 p-1 rounded mb-1 border border-slate-800">
                        <span class="text-[9px] truncate w-16">${p.name}</span>
                        <div class="flex gap-1">${state.sIdx===null?btn('S','blue'):''}${state.nsIdx===null?btn('NS','slate'):''}</div>
                    </div>`;
                } else {
                    bowlL.innerHTML += `<div class="flex justify-between items-center bg-slate-950 p-1 rounded mb-1 border border-slate-800">
                        <span class="text-[9px] truncate w-16">${p.name}</span>
                        ${state.bIdx===null?btn('B','red'):''}
                    </div>`;
                }
            });
        }
    </script>
</body>
</html>
