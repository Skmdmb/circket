<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunday League Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ball-dot { @apply w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black border border-slate-700 flex-shrink-0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-20">

    <div id="setupOverlay" class="fixed inset-0 bg-slate-950 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 w-full max-w-sm shadow-2xl text-center">
            <h1 class="text-2xl font-black text-yellow-500 italic mb-6">TOURNAMENT SETUP</h1>
            <div id="setupStep1" class="space-y-4">
                <input id="numTeams" type="number" value="3" class="w-full bg-black p-4 rounded-2xl text-center text-xl font-bold border border-slate-800">
                <button onclick="generateTeamInputs()" class="w-full bg-blue-600 p-4 rounded-2xl font-black">NEXT</button>
            </div>
            <div id="setupStep2" class="space-y-4 hidden">
                <div id="teamNamesContainer" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar"></div>
                <input id="setupOvers" type="number" value="5" class="w-full bg-black p-4 rounded-2xl text-center font-bold border border-slate-800">
                <button onclick="saveTournamentConfig()" class="w-full bg-yellow-500 text-black p-4 rounded-2xl font-black uppercase">Start Season</button>
            </div>
        </div>
    </div>

    <div id="matchSelector" class="fixed inset-0 bg-black/90 z-[180] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 p-8 rounded-[3rem] w-full max-w-sm border border-slate-800 text-center">
            <h2 class="text-xl font-black text-blue-400 mb-6 uppercase">Set Next Match</h2>
            <div class="space-y-4">
                <select id="selectBatTeam" class="w-full bg-black p-4 rounded-2xl font-bold border border-slate-800"></select>
                <select id="selectBowlTeam" class="w-full bg-black p-4 rounded-2xl font-bold border border-slate-800"></select>
                <button onclick="startSpecificMatch()" class="w-full bg-green-600 p-4 rounded-2xl font-black uppercase">Go Live</button>
            </div>
        </div>
    </div>

    <nav class="p-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="font-black italic text-yellow-500 tracking-tighter text-xl">SUNDAY LIVE</h1>
        <div class="flex gap-2">
            <button onclick="togglePoints()" class="text-[10px] bg-blue-600 px-3 py-2 rounded-full font-bold uppercase">Table</button>
            <button id="adminBtn" onclick="toggleAdmin()" class="text-[10px] bg-slate-800 px-3 py-2 rounded-full font-bold uppercase">Admin</button>
        </div>
    </nav>

    <div id="mainDashboard" class="max-w-md mx-auto p-4 hidden">
        <div class="bg-slate-900 rounded-[2.5rem] p-6 border-b-8 border-yellow-500 mb-4">
            <div class="flex justify-between items-center mb-2">
                <h2 id="batTeamDisp" class="text-xs font-black text-yellow-500 italic uppercase">---</h2>
                <div id="innTag" class="text-[9px] font-black uppercase bg-black px-3 py-1 rounded-full text-slate-500">Innings 1</div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-6xl font-black tracking-tighter" id="dispScore">0/0</h2>
                    <p class="text-slate-500 font-bold text-sm">Overs: <span id="dispOvers" class="text-white">0.0</span> / <span id="limitOvers">5</span></p>
                </div>
                <div id="targetBox" class="hidden text-right">
                    <p class="text-[9px] font-black text-blue-400 uppercase">Target</p>
                    <p id="targetVal" class="text-3xl font-black text-blue-500">---</p>
                </div>
            </div>
            
            <div class="mt-6 pt-4 border-t border-slate-800">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-2">This Over</p>
                <div id="overTimeline" class="flex gap-2 overflow-x-auto no-scrollbar">
                    </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div id="strikerCard" class="bg-slate-900 p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[8px] text-blue-400 font-black mb-1 uppercase">Striker</p>
                <p id="dispSName" class="font-bold truncate text-sm">---</p>
                <p id="dispSStats" class="text-xl font-black">0(0)</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-3xl border-l-4 border-slate-700">
                <p class="text-[8px] text-slate-500 font-black mb-1 uppercase">Non-Striker</p>
                <p id="dispNSName" class="font-bold truncate text-sm">---</p>
                <p id="dispNSStats" class="text-xl font-black">0(0)</p>
            </div>
            <div class="col-span-2 bg-slate-900 p-4 rounded-3xl border-l-4 border-red-600 flex justify-between items-center">
                <div><p class="text-[8px] text-red-500 font-black mb-1 uppercase">Bowler</p><p id="dispBName" class="font-bold text-lg">---</p></div>
                <p id="dispBStats" class="text-xl font-black">0-0 (0.0)</p>
            </div>
        </div>

        <div id="scorerPanel" class="hidden space-y-4 bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="handleRun(0)" class="bg-black h-12 rounded-xl font-bold">0</button>
                <button onclick="handleRun(1)" class="bg-black h-12 rounded-xl font-bold">1</button>
                <button onclick="handleRun(2)" class="bg-black h-12 rounded-xl font-bold">2</button>
                <button onclick="handleRun(3)" class="bg-black h-12 rounded-xl font-bold">3</button>
                <button onclick="handleRun(4)" class="bg-blue-600 h-12 rounded-xl font-black">4</button>
                <button onclick="handleRun(6)" class="bg-green-600 h-12 rounded-xl font-black">6</button>
                <button onclick="openExtraMenu()" class="bg-yellow-600 h-12 rounded-xl font-black text-[10px]">EXTRA</button>
                <button onclick="handleWicketFlow()" class="bg-red-600 h-12 rounded-xl font-black text-[10px]">OUT</button>
            </div>
            <button onclick="undo()" class="w-full bg-slate-800 py-2 rounded-xl text-[10px] font-bold text-slate-400">UNDO LAST BALL</button>
            
            <div id="extraMenu" class="hidden bg-black p-4 rounded-2xl grid grid-cols-2 gap-2">
                <button onclick="handleExtra('WD')" class="bg-slate-800 p-3 rounded-lg text-xs font-bold">WIDE</button>
                <button onclick="handleExtra('NB')" class="bg-slate-800 p-3 rounded-lg text-xs font-bold">NO BALL</button>
            </div>

            <div class="flex bg-black p-1 rounded-xl">
                <button id="adminTab1" onclick="switchAdminTeam(1)" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase">---</button>
                <button id="adminTab2" onclick="switchAdminTeam(2)" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase">---</button>
            </div>
            <div class="flex gap-2">
                <input id="newP" type="text" placeholder="Add Player" class="flex-1 bg-black p-3 rounded-xl text-xs outline-none">
                <button onclick="addP()" class="bg-yellow-500 text-black px-6 rounded-xl font-black">+</button>
            </div>
            <div id="adminPList" class="space-y-1 max-h-40 overflow-y-auto no-scrollbar"></div>
            <button onclick="fullSystemReset()" class="w-full text-[8px] font-black text-red-900 uppercase pt-4">Reset Tournament</button>
        </div>

        <div id="statsContent" class="mt-6"></div>
    </div>

    <div id="pointsOverlay" class="fixed inset-0 bg-black/95 z-[250] hidden p-6 flex items-center justify-center">
        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-black text-yellow-500 mb-4 text-center">POINTS TABLE</h2>
            <div class="bg-slate-900 rounded-3xl p-4 border border-slate-800">
                <table class="w-full text-left text-xs">
                    <tr class="text-slate-500 border-b border-slate-800"><th class="p-3">TEAM</th><th>W</th><th>L</th><th class="p-3 text-right">PTS</th></tr>
                    <tbody id="ptsBody"></tbody>
                </table>
            </div>
            <button onclick="togglePoints()" class="mt-6 w-full text-slate-500 font-bold uppercase text-[10px]">Close</button>
        </div>
    </div>

    <script>
        const BIN_ID = "3bf04df403317e6901ba"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;
        const ADMIN_PASS = "college123";

        let state = {
            maxOvers: 5, runs: 0, wickers: 0, balls: 0,
            players: [], sIdx: null, nsIdx: null, bIdx: null,
            batTeam: '', bowlTeam: '', curBat: '', curInn: 1,
            target: null, isOverWaiting: false, matchEnded: false,
            tournamentTeams: [], points: {},
            overHistory: [] // To store balls in current over
        };
        let isAdmin = false;

        async function sync() { if(isAdmin) await fetch(API_URL,{method:'POST',body:JSON.stringify(state),headers:{'Content-Type':'application/json'}}); }
        async function autoRefresh() {
            if(isAdmin) return;
            const res = await fetch(API_URL);
            const data = await res.json();
            if(data?.tournamentTeams?.length > 0) { state = data; render(); }
        }
        setInterval(autoRefresh, 3000);

        // --- CORE ACTIONS ---
        function handleRun(r) {
            if(state.sIdx===null || state.bIdx===null) return alert("Select Batter/Bowler");
            state.runs += r; state.balls++;
            state.players[state.sIdx].r += r; state.players[state.sIdx].b++;
            state.players[state.bIdx].rc += r; state.players[state.bIdx].bb++;
            state.overHistory.push(r.toString());
            finalizeBall(r);
        }

        function handleExtra(type) {
            let extraRuns = parseInt(prompt("Additional runs taken? (0,1,2...)", "0")) || 0;
            let total = 1 + extraRuns; // 1 for the extra + runs
            state.runs += total;
            state.players[state.bIdx].rc += total;
            if(type === 'NB') {
                state.players[state.sIdx].r += extraRuns;
                state.players[state.sIdx].b++; // No-ball counts as a faced ball
                state.overHistory.push(`Nb${extraRuns > 0 ? '+'+extraRuns : ''}`);
            } else {
                state.overHistory.push(`Wd${extraRuns > 0 ? '+'+extraRuns : ''}`);
            }
            if(extraRuns % 2 !== 0) swap();
            document.getElementById('extraMenu').classList.add('hidden');
            render(); sync();
        }

        function handleWicketFlow() {
            let type = confirm("OK for Wicket (Caught/Bowled) \nCANCEL for Run-Out");
            if(type) {
                // Normal Wicket
                state.wickers++; state.balls++;
                state.players[state.bIdx].w++; state.players[state.bIdx].bb++;
                state.players[state.sIdx].isOut = true;
                state.sIdx = null;
                state.overHistory.push('W');
                finalizeBall(0);
            } else {
                // Run Out
                let runsComp = parseInt(prompt("Runs completed before out? (0,1,2...)", "0")) || 0;
                state.runs += runsComp; state.balls++;
                state.players[state.sIdx].r += runsComp; state.players[state.sIdx].b++;
                state.players[state.bIdx].rc += runsComp; state.players[state.bIdx].bb++;
                let whoOut = confirm("Is Striker Out? (OK=Striker, Cancel=Non-Striker)");
                if(whoOut) { state.players[state.sIdx].isOut = true; state.sIdx = null; }
                else { state.players[state.nsIdx].isOut = true; state.nsIdx = null; }
                state.wickers++;
                state.overHistory.push(`W(${runsComp})`);
                finalizeBall(runsComp);
            }
        }

        function finalizeBall(r) {
            if(r % 2 !== 0) swap();
            if(state.balls > 0 && state.balls % 6 === 0) {
                state.isOverWaiting = true;
                swap();
            }
            render(); sync();
        }

        function render() {
            document.getElementById('dispScore').innerText = `${state.runs}/${state.wickers}`;
            document.getElementById('dispOvers').innerText = `${Math.floor(state.balls/6)}.${state.balls%6}`;
            document.getElementById('batTeamDisp').innerText = state.curBat;
            
            // Timeline
            const timeline = document.getElementById('overTimeline');
            timeline.innerHTML = state.overHistory.map(ball => {
                let color = ball.includes('W') ? 'bg-red-600' : (ball==='4' || ball==='6' ? 'bg-blue-600' : 'bg-slate-800');
                return `<div class="ball-dot ${color}">${ball}</div>`;
            }).join('');

            updatePlayerHUD();
            renderStats();
            renderAdminList();
            checkInningsEnd();
        }

        function checkInningsEnd() {
            const oversDone = state.balls >= (state.maxOvers * 6);
            const allOut = state.wickers >= 10 || state.players.filter(p=>p.team===state.curBat && !p.isOut).length < 1;
            
            if(state.curInn === 1 && (oversDone || allOut)) {
                state.target = state.runs + 1;
                state.curInn = 2;
                state.curBat = state.bowlTeam;
                state.runs = 0; state.wickers = 0; state.balls = 0;
                state.sIdx = state.nsIdx = state.bIdx = null;
                state.overHistory = [];
                // FRESH START: Clear "isOut" for everyone for 2nd innings
                state.players.forEach(p => p.isOut = false); 
                alert("1st Innings Over! Target: " + state.target);
                render(); sync();
            } else if (state.curInn === 2) {
                if(state.runs >= state.target) finish(state.curBat);
                else if(oversDone || allOut) finish(state.curBat===state.batTeam ? state.bowlTeam : state.batTeam);
            }
        }

        function swap() { let t = state.sIdx; state.sIdx = state.nsIdx; state.nsIdx = t; }
        function openExtraMenu() { document.getElementById('extraMenu').classList.toggle('hidden'); }
        function toggleAdmin() { /* Use existing Admin logic */ isAdmin=true; document.getElementById('scorerPanel').classList.remove('hidden'); if(state.tournamentTeams.length===0) document.getElementById('setupOverlay').classList.remove('hidden'); }
        
        function updatePlayerHUD() {
            if(state.sIdx!==null) {
                document.getElementById('dispSName').innerText = state.players[state.sIdx].name;
                document.getElementById('dispSStats').innerText = `${state.players[state.sIdx].r}(${state.players[state.sIdx].b})`;
            }
            if(state.bIdx!==null) {
                const b = state.players[state.bIdx];
                document.getElementById('dispBName').innerText = b.name;
                document.getElementById('dispBStats').innerText = `${b.w}-${b.rc} (${Math.floor(b.bb/6)}.${b.bb%6})`;
            }
        }

        // Add other helper functions (generateTeamInputs, saveTournamentConfig, startSpecificMatch, addP, renderAdminList, renderStats) 
        // essentially same as previous code but ensure renderStats shows Bowl stats (p.w, p.rc, p.bb).
    </script>
</body>
</html>
